<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Watch Patrol</title>
    <style>
        :root {
            --bg: #000000;
            --surface: #1c1c1e;
            --border: #2c2c2e;
            --blue: #0a84ff;
            --green: #30d158;
            --red: #ff453a;
            --orange: #ff9f0a;
            --text: #ffffff;
            --muted: #8e8e93;
            --font-main: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            --font-mono: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas, monospace;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; -webkit-user-select: none; }
        html { background: var(--bg); color: var(--text); font-family: var(--font-main); }
        body { width: 100vw; min-height: 100vh; overflow-x: hidden; padding-bottom: 40px; }

        /* Watch Header */
        header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 8px 12px; position: sticky; top: 0; background: rgba(0,0,0,0.8);
            backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); z-index: 50;
        }
        .time { font-size: 15px; font-weight: 600; letter-spacing: 0.5px; }
        .status-icons { display: flex; gap: 8px; }
        .status-dot { width: 10px; height: 10px; border-radius: 50%; background: var(--border); }
        
        /* Main Dial Section */
        .hero { display: flex; flex-direction: column; align-items: center; padding: 10px; margin-top: 5px; }
        .dial-container { position: relative; width: 160px; height: 160px; margin-bottom: 12px; }
        .progress-ring { position: absolute; inset: 0; transform: rotate(-90deg); width: 160px; height: 160px; }
        .ring-bg { fill: none; stroke: var(--surface); stroke-width: 12; }
        .ring-fill { fill: none; stroke: var(--blue); stroke-width: 12; stroke-linecap: round; stroke-dasharray: 427; stroke-dashoffset: 427; transition: stroke-dashoffset 0.6s ease-in-out; }
        
        .clock-in-btn {
            position: absolute; inset: 12px; background: var(--surface); border-radius: 50%;
            border: none; color: var(--blue); display: flex; flex-direction: column; align-items: center;
            justify-content: center; cursor: pointer; transition: transform 0.1s, background 0.2s;
        }
        .clock-in-btn:active { transform: scale(0.92); background: #2c2c2e; }
        .clock-in-btn svg { width: 40px; height: 40px; stroke: currentColor; fill: none; stroke-width: 2; margin-bottom: 4px; }
        .clock-in-text { font-size: 14px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; }

        /* Target Info */
        .target-box { text-align: center; width: 100%; padding: 0 10px; }
        .target-sub { font-size: 12px; color: var(--muted); font-weight: 600; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 4px; }
        .target-name { font-size: 26px; font-weight: 800; line-height: 1.1; margin-bottom: 8px; color: #fff; }
        
        /* Context Actions under Dial */
        .context-actions { display: flex; flex-direction: column; gap: 8px; width: 90%; margin: 0 auto; margin-top: 10px; }
        .btn-small { 
            background: var(--surface); border-radius: 20px; padding: 10px; border: none; color: var(--text);
            font-size: 13px; font-weight: 600; display: flex; align-items: center; justify-content: center; gap: 6px;
        }
        .btn-small svg { width: 16px; height: 16px; }
        .btn-gps-auto { background: rgba(255, 159, 10, 0.15); color: var(--orange); }
        .btn-gps-auto.active { background: rgba(48, 209, 88, 0.15); color: var(--green); }
        
        /* Timeline */
        .section-title { font-size: 14px; font-weight: 700; color: var(--muted); margin: 24px 0 12px 16px; text-transform: uppercase; }
        .timeline { padding: 0 12px; display: flex; flex-direction: column; gap: 8px; }
        .tl-item { background: var(--surface); border-radius: 12px; padding: 12px; display: flex; align-items: center; justify-content: space-between; }
        .tl-item.done { border: 1px solid rgba(48, 209, 88, 0.3); }
        .tl-item.current { border: 1px solid var(--blue); background: rgba(10, 132, 255, 0.1); }
        .tl-left { display: flex; align-items: center; gap: 10px; }
        .tl-dot { width: 12px; height: 12px; border-radius: 50%; background: var(--border); }
        .tl-item.done .tl-dot { background: var(--green); }
        .tl-item.current .tl-dot { background: var(--blue); box-shadow: 0 0 8px var(--blue); }
        .tl-name { font-size: 14px; font-weight: 600; }
        .tl-time { font-family: var(--font-mono); font-size: 12px; color: var(--muted); }

        /* Bottom Menu */
        .menu { padding: 12px; display: flex; flex-direction: column; gap: 8px; margin-top: 16px; }
        .btn-menu {
            background: var(--surface); padding: 14px; border-radius: 16px; border: none;
            color: var(--text); font-size: 15px; font-weight: 600; text-align: left;
            display: flex; align-items: center; gap: 12px;
        }
        .btn-menu svg { width: 20px; height: 20px; color: var(--blue); }

        /* Modals */
        .modal {
            display: none; position: fixed; inset: 0; background: var(--bg); z-index: 100;
            flex-direction: column; padding: 10px; overflow-y: auto; padding-bottom: 40px;
        }
        .modal.show { display: flex; }
        .modal-header { font-size: 20px; font-weight: 700; margin-bottom: 16px; margin-top: 10px; text-align: center; }
        .modal-body { font-size: 14px; color: var(--muted); text-align: center; margin-bottom: 20px; }
        
        .input-code {
            width: 100%; background: var(--surface); border: 2px solid var(--border); border-radius: 12px;
            color: white; font-size: 32px; font-weight: 800; text-align: center; padding: 16px;
            letter-spacing: 8px; margin-bottom: 20px; outline: none; font-family: var(--font-mono);
        }
        
        .btn-primary { background: var(--blue); color: white; padding: 14px; border-radius: 16px; font-weight: 700; font-size: 16px; border: none; width: 100%; margin-bottom: 10px; }
        .btn-danger { background: rgba(255, 69, 58, 0.2); color: var(--red); padding: 14px; border-radius: 16px; font-weight: 700; font-size: 16px; border: none; width: 100%; margin-bottom: 10px; }
        .btn-cancel { background: var(--surface); color: white; padding: 14px; border-radius: 16px; font-weight: 600; font-size: 16px; border: none; width: 100%; }

        /* Completion View */
        #completed-view { display: none; flex-direction: column; align-items: center; justify-content: center; padding-top: 40px; }
        .complete-icon { width: 80px; height: 80px; border-radius: 50%; background: rgba(48, 209, 88, 0.2); color: var(--green); display: flex; align-items: center; justify-content: center; margin-bottom: 16px; }
        .complete-icon svg { width: 40px; height: 40px; }

        /* Utils */
        .hidden { display: none !important; }
        .text-green { color: var(--green) !important; }
        .text-blue { color: var(--blue) !important; }
    </style>
</head>
<body>

    <!-- Header Status -->
    <header>
        <div class="time" id="watch-time">00:00</div>
        <div class="status-icons">
            <div class="status-dot" id="dot-sync" title="Sync Status"></div>
            <div class="status-dot" id="dot-gps" title="GPS Status"></div>
        </div>
    </header>

    <!-- Main Active View -->
    <div id="active-view">
        <section class="hero">
            <div class="dial-container">
                <svg class="progress-ring" viewBox="0 0 150 150">
                    <circle class="ring-bg" cx="75" cy="75" r="68"/>
                    <circle class="ring-fill" id="progress-fill" cx="75" cy="75" r="68"/>
                </svg>
                <button class="clock-in-btn" id="btn-clockin" onclick="clockIn(event)">
                    <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path>
                        <polyline points="22 4 12 14.01 9 11.01"></polyline>
                    </svg>
                    <span class="clock-in-text">Log</span>
                </button>
            </div>

            <div class="target-box">
                <div class="target-sub" id="target-sub">Target · Pt 1</div>
                <div class="target-name" id="target-name">BME</div>
            </div>
        </section>

        <div class="context-actions">
            <button class="btn-small btn-gps-auto" id="btn-gps-toggle" onclick="toggleGpsAuto()">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="10" r="3"/><path d="M12 21.7C17.3 17 20 13 20 10a8 8 0 1 0-16 0c0 3 2.7 7 8 11.7z"/></svg>
                <span id="gps-status-text">Autopilot OFF</span>
            </button>
            <button class="btn-small" id="btn-bind-gps" onclick="bindGpsToCurrent()">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
                Bind GPS Here
            </button>
        </div>
    </div>

    <!-- Completed View -->
    <div id="completed-view">
        <div class="complete-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
        </div>
        <div class="target-name">Complete</div>
        <div class="target-sub" style="margin-bottom: 20px;">All Checkpoints Logged</div>
    </div>

    <!-- Timeline -->
    <div class="section-title">Timeline (<span id="progress-text">0/19</span>)</div>
    <div class="timeline" id="timeline-list">
        <!-- Rendered via JS -->
    </div>

    <!-- Menu Actions -->
    <div class="section-title">Actions</div>
    <div class="menu">
        <button class="btn-menu" onclick="showModal('sync-modal')">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
            Link Device (Sync)
        </button>
        <button class="btn-menu" onclick="showModal('reset-modal')">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/><path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"/><path d="M8 16H3v5"/></svg>
            Reset Route
        </button>
        <button class="btn-menu" onclick="shareLogs()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="18" cy="5" r="3"></circle><circle cx="6" cy="12" r="3"></circle><circle cx="18" cy="19" r="3"></circle><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"></line><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"></line></svg>
            Share Logs
        </button>
    </div>

    <!-- Modals -->
    <!-- Sync Modal -->
    <div id="sync-modal" class="modal">
        <div class="modal-header">Device Sync</div>
        <div class="modal-body">Enter code from phone to mirror data.</div>
        <input type="number" id="sync-input" class="input-code" placeholder="----" pattern="\d*">
        <button class="btn-primary" onclick="saveSyncCode()">Connect</button>
        <button class="btn-danger hidden" id="btn-disconnect" onclick="disconnectSync()" style="margin-bottom:10px;">Disconnect</button>
        <button class="btn-cancel" onclick="hideModal('sync-modal')">Cancel</button>
    </div>

    <!-- Reset Modal -->
    <div id="reset-modal" class="modal">
        <div class="modal-header">Reset Route</div>
        <div class="modal-body">Start a new patrol loop. Logs will clear.</div>
        <button class="btn-primary" onclick="confirmReset(0)">Full Route (Pt 1)</button>
        <button class="btn-primary" onclick="confirmReset(10)" style="background:var(--surface); border:1px solid var(--border);">Half Route (Pt 11)</button>
        <button class="btn-cancel" style="margin-top:20px;" onclick="hideModal('reset-modal')">Cancel</button>
    </div>

    <script>
        /* ── UTILS & DATA ── */
        const ROUTE_POINTS = ["BME","TG/OC DR","CY","E1/HTTC","FC","N1","S2","S1/S8","TG / OC DR","CY","BME","S1/S8","S2","N1","FC","HTCC / E1","OC DR","TG","BME"];
        const TOTAL = ROUTE_POINTS.length;
        
        let startIndex = 0, currentIndex = 0, startMode = 'default';
        let logs = [], isFinished = false, gpsData = {};
        let isGpsActive = false, watchPositionId = null;

        let deviceId = Math.random().toString(36).substring(2, 9);
        let syncCode = safeGet('patrolSyncCode') || '';
        let isSyncActive = !!syncCode;
        let processedMsgs = []; 
        let syncTimer = null;
        let lastSyncUnix = Math.floor(Date.now() / 1000) - (12 * 3600);

        function safeGet(key) { try { return localStorage.getItem(key); } catch(e) { return null; } }
        function safeSet(key, val) { try { localStorage.setItem(key, val); } catch(e) {} }
        function safeDel(key) { try { localStorage.removeItem(key); } catch(e) {} }

        // Load State
        try { let _g = safeGet('patrolGpsData'); if (_g) gpsData = JSON.parse(_g); } catch(e) {}
        try { let _smode = safeGet('patrolStartMode'); if (_smode) startMode = _smode; } catch(e) {}
        try { let _si = safeGet('patrolStartIndex'); if (_si) startIndex = parseInt(_si, 10); } catch(e) {}
        try { let _ci = safeGet('patrolCurrentIndex'); if (_ci) currentIndex = parseInt(_ci, 10); else currentIndex = startIndex; } catch(e) {}
        try {
            let _logs = safeGet('patrolLogs');
            if (_logs) {
                let parsed = JSON.parse(_logs);
                logs = parsed.map(l => ({ point: l.point, location: l.location, timestamp: new Date(l.timestamp) }));
            }
        } catch(e) {}
        try { if (safeGet('patrolIsFinished') === 'true') isFinished = true; } catch(e) {}

        function saveRouteState() {
            safeSet('patrolStartMode', startMode);
            safeSet('patrolStartIndex', startIndex);
            safeSet('patrolCurrentIndex', currentIndex);
            safeSet('patrolLogs', JSON.stringify(logs));
            safeSet('patrolIsFinished', isFinished);
            safeSet('patrolGpsData', JSON.stringify(gpsData));
        }

        /* ── CLOCK & UI ── */
        function updateClock() {
            const now = new Date();
            const hrs = now.getHours().toString().padStart(2, '0');
            const mins = now.getMinutes().toString().padStart(2, '0');
            document.getElementById('watch-time').textContent = `${hrs}:${mins}`;
        }
        setInterval(updateClock, 1000); updateClock();

        function showModal(id) { document.getElementById(id).classList.add('show'); }
        function hideModal(id) { document.getElementById(id).classList.remove('show'); }

        function clockIn(event) {
            if (isFinished) return;
            
            // Visual feedback
            const btn = document.getElementById('btn-clockin');
            btn.style.transform = 'scale(0.9)';
            btn.style.background = '#0a84ff';
            btn.style.color = '#fff';
            setTimeout(() => { btn.style.transform = ''; btn.style.background = ''; btn.style.color = ''; }, 150);

            logs.push({ point: currentIndex + 1, location: ROUTE_POINTS[currentIndex], timestamp: new Date() });
            
            if (currentIndex + 1 >= TOTAL) isFinished = true; else currentIndex++;
            saveRouteState(); updateUI(); broadcastFullState();
        }

        function updateUI() {
            const activeTotal = TOTAL - startIndex;
            const cleared = logs.length;
            const pct = activeTotal === 0 ? 1 : (cleared / activeTotal);
            
            // Progress Ring
            const circ = 2 * Math.PI * 68; // r=68
            const fillEl = document.getElementById('progress-fill');
            fillEl.style.strokeDashoffset = circ * (1 - pct);
            
            document.getElementById('progress-text').textContent = `${cleared}/${activeTotal}`;

            if (isFinished) {
                document.getElementById('active-view').style.display = 'none';
                document.getElementById('completed-view').style.display = 'flex';
                document.querySelector('.progress-ring').style.display = 'none';
            } else {
                document.getElementById('active-view').style.display = 'block';
                document.getElementById('completed-view').style.display = 'none';
                document.querySelector('.progress-ring').style.display = 'block';
                
                document.getElementById('target-sub').textContent = `PT ${currentIndex + 1}`;
                document.getElementById('target-name').textContent = ROUTE_POINTS[currentIndex];
                
                const locName = ROUTE_POINTS[currentIndex];
                const btnBind = document.getElementById('btn-bind-gps');
                if(gpsData[locName]) {
                    btnBind.innerHTML = '📍 GPS Bound (Update)';
                    btnBind.style.color = 'var(--muted)';
                } else {
                    btnBind.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg> Bind GPS Here';
                    btnBind.style.color = 'var(--text)';
                }
            }

            renderTimeline();
        }

        function renderTimeline() {
            const list = document.getElementById('timeline-list');
            let html = '';
            
            for (let i = 0; i < ROUTE_POINTS.length; i++) {
                if(i < startIndex) continue; // Skip timeline rendering for ignored points
                
                const logEntry = logs.find(l => l.point === i + 1);
                const isDone = !!logEntry;
                const isCurrent = (i === currentIndex) && !isFinished;
                
                let timeStr = '--:--';
                if (isDone) {
                    const d = logEntry.timestamp;
                    timeStr = `${d.getHours().toString().padStart(2,'0')}:${d.getMinutes().toString().padStart(2,'0')}`;
                } else if (isCurrent) {
                    timeStr = 'NEXT';
                }

                const cls = isDone ? 'done' : (isCurrent ? 'current' : '');
                html += `
                    <div class="tl-item ${cls}">
                        <div class="tl-left">
                            <div class="tl-dot"></div>
                            <div class="tl-name">${ROUTE_POINTS[i]}</div>
                        </div>
                        <div class="tl-time ${isCurrent ? 'text-blue' : ''}">${timeStr}</div>
                    </div>
                `;
            }
            list.innerHTML = html;
        }

        function confirmReset(startAt) {
            startIndex = startAt;
            startMode = (startAt === 10) ? 'second_half' : 'default';
            currentIndex = startIndex;
            logs = [];
            isFinished = false;
            saveRouteState(); updateUI(); hideModal('reset-modal'); broadcastFullState();
        }

        /* ── SYNC ENGINE (NTFY) ── */
        function setSyncDot(state) {
            const dot = document.getElementById('dot-sync');
            if(state === 'connected') dot.style.background = 'var(--green)';
            else if(state === 'connecting') dot.style.background = 'var(--orange)';
            else if(state === 'error') dot.style.background = 'var(--red)';
            else dot.style.background = 'var(--border)';
        }

        function startSyncEngine() {
            if (!syncCode) return;
            setSyncDot('connecting');
            clearTimeout(syncTimer);
            
            function pollServer() {
                if (!isSyncActive) return;
                const topic = 'patrol-sync-' + syncCode;
                const url = 'https://ntfy.sh/' + topic + '/json?poll=1&since=' + lastSyncUnix;
                
                fetch(url, { headers: { 'Cache-Control': 'no-cache, no-store, must-revalidate' } })
                .then(res => { if (!res.ok) throw new Error('Bad response'); return res.text(); })
                .then(text => {
                    setSyncDot('connected');
                    let highestTime = lastSyncUnix;
                    if (text) {
                        const lines = text.trim().split('\n');
                        for(let i=0; i<lines.length; i++) {
                            if(!lines[i]) continue;
                            try {
                                const msg = JSON.parse(lines[i]);
                                if (msg.time && msg.time > highestTime) highestTime = msg.time;
                                if (processedMsgs.indexOf(msg.id) === -1) {
                                    processedMsgs.push(msg.id);
                                    if (processedMsgs.length > 100) processedMsgs.shift();
                                    handleIncomingSync(JSON.parse(msg.message));
                                }
                            } catch(err) {}
                        }
                    }
                    lastSyncUnix = highestTime; 
                    syncTimer = setTimeout(pollServer, 3000);
                })
                .catch(() => {
                    setSyncDot('error');
                    syncTimer = setTimeout(pollServer, 5000);
                });
            }
            pollServer();
            
            document.getElementById('sync-input').value = syncCode;
            document.getElementById('btn-disconnect').classList.remove('hidden');
        }

        function sendSyncMessage(dataObj) {
            if (!syncCode || !isSyncActive) return;
            dataObj.d = deviceId;
            try { fetch('https://ntfy.sh/patrol-sync-' + syncCode, { method: 'POST', body: JSON.stringify(dataObj) }).catch(()=>{}); } catch(e) {}
        }

        function broadcastFullState() {
            if (!isSyncActive) return;
            const smallLogs = logs.map(l => ({ p: l.point, loc: l.location, t: l.timestamp.getTime() }));
            sendSyncMessage({ type: 'STATE', c: currentIndex, s: startIndex, f: isFinished, m: startMode, l: smallLogs });
        }

        function broadcastGPS() {
            if (!isSyncActive) return;
            sendSyncMessage({ type: 'GPS', g: gpsData });
        }

        function handleIncomingSync(payload) {
            if (!payload || payload.d === deviceId) return;
            if (payload.type === 'REQ') {
                broadcastFullState(); broadcastGPS();
            } else if (payload.type === 'STATE') {
                if (payload.l.length >= logs.length || payload.l.length === 0) {
                    currentIndex = payload.c; startIndex = payload.s; isFinished = payload.f; startMode = payload.m;
                    logs = payload.l.map(l => ({ point: l.p, location: l.loc, timestamp: new Date(l.t) }));
                    saveRouteState(); updateUI();
                }
            } else if (payload.type === 'GPS') {
                let updated = false;
                for (let loc in payload.g) {
                    if (!gpsData[loc]) { gpsData[loc] = payload.g[loc]; updated = true; }
                }
                if (updated) { saveRouteState(); updateUI(); }
            }
        }

        function saveSyncCode() {
            const input = document.getElementById('sync-input').value;
            if(input.length < 4) { alert("Code too short"); return; }
            syncCode = input; safeSet('patrolSyncCode', syncCode);
            isSyncActive = true; hideModal('sync-modal'); startSyncEngine();
        }

        function disconnectSync() {
            isSyncActive = false; syncCode = ''; safeDel('patrolSyncCode');
            clearTimeout(syncTimer); setSyncDot('off');
            document.getElementById('sync-input').value = '';
            document.getElementById('btn-disconnect').classList.add('hidden');
            hideModal('sync-modal');
        }

        /* ── GPS AUTOPILOT ── */
        function bindGpsToCurrent() {
            if (isFinished) return;
            if (!navigator.geolocation) { alert("No GPS"); return; }
            const locName = ROUTE_POINTS[currentIndex];
            const btn = document.getElementById('btn-bind-gps');
            btn.innerHTML = "Locating...";
            
            navigator.geolocation.getCurrentPosition(
                (pos) => {
                    gpsData[locName] = { lat: pos.coords.latitude, lng: pos.coords.longitude, radius: 20 };
                    saveRouteState(); broadcastGPS(); updateUI();
                    alert("Bound " + locName + "\nAcc: ±" + Math.round(pos.coords.accuracy) + "m");
                },
                (err) => { alert("Error: " + err.message); updateUI(); },
                { enableHighAccuracy: true }
            );
        }

        function toggleGpsAuto() {
            const dot = document.getElementById('dot-gps');
            const btn = document.getElementById('btn-gps-toggle');
            const txt = document.getElementById('gps-status-text');

            if (isGpsActive) {
                isGpsActive = false; if (watchPositionId) navigator.geolocation.clearWatch(watchPositionId);
                dot.style.background = 'var(--border)';
                btn.classList.remove('active');
                txt.textContent = 'Autopilot OFF';
            } else {
                if (!navigator.geolocation) { alert("No GPS"); return; }
                isGpsActive = true;
                dot.style.background = 'var(--orange)';
                btn.classList.add('active');
                txt.textContent = 'Searching...';
                
                watchPositionId = navigator.geolocation.watchPosition((pos) => {
                    dot.style.background = 'var(--green)';
                    if (isFinished) { txt.textContent = 'Done'; return; }
                    
                    const target = gpsData[ROUTE_POINTS[currentIndex]];
                    if (target) {
                        const acc = pos.coords.accuracy || 0; if (acc > 100) return;
                        const R = 6371e3, rad = Math.PI/180;
                        const dLat = (target.lat - pos.coords.latitude) * rad, dLon = (target.lng - pos.coords.longitude) * rad;
                        const a = Math.sin(dLat/2)**2 + Math.cos(pos.coords.latitude*rad) * Math.cos(target.lat*rad) * Math.sin(dLon/2)**2;
                        const dist = R * (2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a)));
                        
                        txt.textContent = `${Math.round(dist)}m Away`;
                        if (dist <= (target.radius || 20) + (acc * 0.75)) clockIn(null);
                    } else {
                        txt.textContent = 'Target Unbound';
                    }
                }, () => { toggleGpsAuto(); alert("GPS Error"); }, { enableHighAccuracy: true, maximumAge: 0 });
            }
        }

        /* ── EXPORT ── */
        function shareLogs() {
            let d = logs.length > 0 ? logs[0].timestamp : new Date();
            let text = `Date: ${d.getDate().toString().padStart(2,'0')}/${(d.getMonth()+1).toString().padStart(2,'0')}/${d.getFullYear()}\n\n`;
            
            let loopStart = startMode === 'second_half' ? 10 : 0;
            for (let i = loopStart; i < TOTAL; i++) {
                if (i === 0) text += '1st HALF:\n';
                if (i === 10) { if (i !== 0) text += '\n'; text += '2nd HALF:\n'; }
                
                let t = '--:--:--';
                const entry = logs.find(l => l.point === i + 1);
                if (entry) {
                    const ts = entry.timestamp;
                    t = `${ts.getHours().toString().padStart(2,'0')}:${ts.getMinutes().toString().padStart(2,'0')}:${ts.getSeconds().toString().padStart(2,'0')}`;
                }
                text += `${i === 18 ? 'FOYER' : ROUTE_POINTS[i]} - ${t}\n`;
            }
            text += '\nAll in order & S/Normal';
            
            if (navigator.share) {
                navigator.share({ title: 'Patrol Logs', text: text }).catch(()=>{});
            } else {
                alert("Share not supported on this browser.");
            }
        }

        /* ── INIT ── */
        updateUI();
        if (isSyncActive) startSyncEngine();

        // Screen Wake visibility catch (vital for watch)
        document.addEventListener("visibilitychange", function() {
            if (document.visibilityState === 'visible' && isSyncActive) {
                clearTimeout(syncTimer); startSyncEngine();
            }
        });
    </script>
</body>
</html>
