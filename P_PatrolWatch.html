
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Watch Patrol</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">

<style>
    :root {
        --blue: #5fa3ff;
        --blue-dim: rgba(95,163,255,0.18);
        --blue-glow: rgba(95,163,255,0.35);
        --green: #3ddc84;
        --green-dim: rgba(61,220,132,0.18);
        --green-glow: rgba(61,220,132,0.35);
        --red: #ff5c5c;
        --amber: #ffb340;
        --surface: #1c1c1e;
        --surface2: #2c2c2e;
        --border: #333336;
        --muted: #636366;
        --muted2: #8e8e93;
        --display: 'Syne', sans-serif;
        --mono: 'JetBrains Mono', monospace;
    }

    * { box-sizing: border-box; }

    body {
        background: #000;
        color: #fff;
        font-family: var(--mono);
        margin: 0;
        padding: 10px 10px 8px;
        height: 100vh;
        display: flex;
        flex-direction: column;
        overflow: hidden;
    }

    /* ── Views ── */
    .view { display: none; flex-direction: column; height: 100%; width: 100%; gap: 7px; }
    .view.active { display: flex; }

    /* ── Header ── */
    .header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        flex-shrink: 0;
    }
    .clock {
        font-family: var(--mono);
        font-size: 17px;
        font-weight: 700;
        color: var(--blue);
        letter-spacing: 1px;
        line-height: 1;
    }
    .header-center {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 2px;
    }
    .prog-pill {
        font-family: var(--mono);
        font-size: 11px;
        font-weight: 700;
        color: #fff;
        background: rgba(255,255,255,0.1);
        border: 1px solid rgba(255,255,255,0.18);
        padding: 3px 9px;
        border-radius: 10px;
        line-height: 1;
    }
    /* Mini progress bar under pill */
    .mini-progress-wrap {
        width: 56px;
        height: 2px;
        background: rgba(255,255,255,0.1);
        border-radius: 2px;
        overflow: hidden;
    }
    .mini-progress-fill {
        height: 100%;
        background: var(--blue);
        border-radius: 2px;
        transition: width 0.4s ease;
        width: 0%;
    }
    .gear-btn {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 50%;
        color: var(--muted2);
        font-size: 13px;
        width: 28px; height: 28px;
        display: flex; align-items: center; justify-content: center;
        cursor: pointer;
        flex-shrink: 0;
    }

    /* ── Target Card (compact) ── */
    .target-card {
        flex: 1;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        background: linear-gradient(150deg, rgba(45,126,255,0.12) 0%, rgba(45,126,255,0.03) 100%);
        border-radius: 16px;
        padding: 10px 12px 9px;
        border: 1px solid rgba(45,126,255,0.25);
        position: relative;
        overflow: hidden;
    }
    .target-card::before {
        content: '';
        position: absolute;
        top: -18px; right: -18px;
        width: 60px; height: 60px;
        border-radius: 50%;
        background: radial-gradient(circle, rgba(95,163,255,0.12) 0%, transparent 70%);
        pointer-events: none;
    }
    .target-card.done {
        background: linear-gradient(150deg, rgba(61,220,132,0.12) 0%, rgba(61,220,132,0.03) 100%);
        border-color: rgba(61,220,132,0.3);
    }
    .target-card.done::before {
        background: radial-gradient(circle, rgba(61,220,132,0.12) 0%, transparent 70%);
    }

    /* Card top row: label + elapsed */
    .card-toprow {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 4px;
    }
    .label-wrap {
        display: flex;
        align-items: center;
        gap: 5px;
    }
    .dot-pulse {
        width: 5px; height: 5px;
        border-radius: 50%;
        background: var(--blue);
        box-shadow: 0 0 5px var(--blue);
        animation: dotPulse 1.5s ease-in-out infinite;
        flex-shrink: 0;
    }
    @keyframes dotPulse {
        0%, 100% { opacity: 1; transform: scale(1); }
        50%       { opacity: 0.3; transform: scale(0.75); }
    }
    .label {
        font-family: var(--mono);
        font-size: 9px;
        font-weight: 700;
        color: var(--blue);
        letter-spacing: 1.5px;
        text-transform: uppercase;
    }
    /* Elapsed chip (new) */
    .elapsed-chip {
        font-family: var(--mono);
        font-size: 9px;
        font-weight: 700;
        color: var(--amber);
        letter-spacing: 0.5px;
        background: rgba(255,179,64,0.1);
        border: 1px solid rgba(255,179,64,0.25);
        border-radius: 6px;
        padding: 1px 6px;
        line-height: 1.5;
    }

    /* Current target name */
    .target-name {
        font-family: var(--display);
        font-size: 32px;
        font-weight: 800;
        margin: 0;
        line-height: 1.0;
        color: #fff;
        letter-spacing: -0.5px;
    }

    /* Progress bar (inside card) */
    .route-progress-wrap {
        margin: 7px 0 5px;
        width: 100%;
    }
    .route-progress-bar {
        height: 3px;
        background: rgba(255,255,255,0.08);
        border-radius: 3px;
        overflow: hidden;
    }
    .route-progress-fill {
        height: 100%;
        background: linear-gradient(90deg, var(--blue), #a0c8ff);
        border-radius: 3px;
        transition: width 0.4s ease;
        width: 0%;
    }
    .route-progress-fill.done-fill {
        background: linear-gradient(90deg, var(--green), #7dffc0);
    }

    /* Stats row (new) */
    .stats-row {
        display: flex;
        align-items: center;
        gap: 6px;
        flex-wrap: nowrap;
    }
    .stat-chip {
        display: flex;
        align-items: center;
        gap: 3px;
        font-family: var(--mono);
        font-size: 9px;
        font-weight: 700;
        color: var(--muted2);
    }
    .stat-chip .stat-val {
        color: #fff;
        font-size: 10px;
    }
    .stat-sep {
        color: var(--border);
        font-size: 10px;
    }

    /* Next target row */
    .next-target {
        font-family: var(--mono);
        font-size: 10px;
        color: rgba(255,255,255,0.45);
        display: flex;
        align-items: center;
        gap: 4px;
        margin-top: 1px;
    }
    .next-arrow {
        color: var(--blue);
        opacity: 0.6;
        font-size: 9px;
    }

    /* ── LOG Button ── */
    .btn {
        background: linear-gradient(135deg, #5fa3ff, #1a5fd4);
        color: #fff;
        border: none;
        border-radius: 16px;
        font-family: var(--display);
        font-size: 16px;
        font-weight: 800;
        padding: 14px 0;
        width: 100%;
        cursor: pointer;
        text-transform: uppercase;
        letter-spacing: 1.5px;
        box-shadow: 0 4px 16px rgba(45,126,255,0.3);
        transition: transform 0.1s, box-shadow 0.2s, opacity 0.2s;
        flex-shrink: 0;
    }
    .btn:active { transform: scale(0.96); box-shadow: 0 2px 8px rgba(45,126,255,0.25); }
    .btn-secondary {
        background: var(--surface);
        color: #fff;
        font-family: -apple-system, sans-serif;
        font-size: 13px;
        font-weight: 600;
        padding: 12px 0;
        border-radius: 13px;
        text-transform: none;
        box-shadow: none;
        border: 1px solid var(--border);
        letter-spacing: 0;
    }
    .btn-danger {
        background: rgba(255,92,92,0.12);
        color: var(--red);
        border: 1px solid rgba(255,92,92,0.28);
        border-radius: 13px;
        text-transform: none;
        font-size: 14px;
        box-shadow: none;
    }

    /* ── Sync Banner ── */
    .sync-banner {
        font-size: 8px;
        color: var(--green);
        text-align: center;
        font-family: var(--mono);
        letter-spacing: 1.5px;
        opacity: 0.35;
        transition: all 0.3s;
        flex-shrink: 0;
        padding: 0;
    }

    /* ── Settings View ── */
    .watch-select {
        background: var(--surface);
        color: #fff;
        border: 1px solid var(--border);
        border-radius: 12px;
        font-size: 13px;
        font-weight: 600;
        padding: 11px 10px;
        width: 100%;
        margin-bottom: 10px;
        text-align: center;
        appearance: none;
        -webkit-appearance: none;
    }
    .settings-title {
        font-family: var(--display);
        font-size: 17px;
        font-weight: 800;
        margin-bottom: 12px;
        text-align: center;
    }
    input[type="text"] {
        width: 100%; padding: 11px;
        border-radius: 12px;
        background: var(--surface);
        border: 1px solid var(--border);
        color: #fff;
        font-family: var(--mono);
        font-size: 13px;
        margin-bottom: 9px;
        text-align: center;
    }
    .scrollable { overflow-y: auto; flex: 1; padding-bottom: 20px; display: flex; flex-direction: column; gap: 0; }
    .scrollable::-webkit-scrollbar { display: none; }
    .divider { height: 1px; background: var(--border); margin: 12px 0; }
    .field-label {
        font-size: 9px;
        color: var(--muted2);
        margin-bottom: 5px;
        text-align: center;
        text-transform: uppercase;
        font-weight: 700;
        letter-spacing: 1px;
    }
    .field-label.danger { color: var(--red); }

    /* ── Complete View ── */
    .complete-icon {
        width: 52px; height: 52px;
        border-radius: 50%;
        border: 2px solid var(--green);
        background: rgba(61,220,132,0.12);
        display: flex; align-items: center; justify-content: center;
        margin: 0 auto 10px;
        box-shadow: 0 0 20px var(--green-glow);
    }
</style>
</head>
<body>

<!-- 1. ACTIVE PATROL VIEW -->
<div id="view-active" class="view active">

    <!-- Header: Time | Progress+Bar | ⚙ -->
    <div class="header">
        <div class="clock" id="clock">00:00</div>
        <div class="header-center">
            <div class="prog-pill" id="prog-text">0/19</div>
            <div class="mini-progress-wrap">
                <div class="mini-progress-fill" id="mini-prog-fill"></div>
            </div>
        </div>
        <button class="gear-btn" onclick="showSettings()">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0 .33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
        </button>
    </div>

    <!-- Target Card -->
    <div class="target-card" id="target-card">

        <!-- Top: label + elapsed timer -->
        <div class="card-toprow">
            <div class="label-wrap">
                <div class="dot-pulse"></div>
                <div class="label" id="target-label">CURRENT</div>
            </div>
            <div class="elapsed-chip" id="elapsed-chip">–m</div>
        </div>

        <!-- Target Name -->
        <div class="target-name" id="target-name">BME</div>

        <!-- Route Progress Bar -->
        <div class="route-progress-wrap">
            <div class="route-progress-bar">
                <div class="route-progress-fill" id="route-prog-fill"></div>
            </div>
        </div>

        <!-- Stats Row: Cleared | Left -->
        <div class="stats-row">
            <div class="stat-chip">✓ <span class="stat-val" id="stat-cleared">0</span></div>
            <div class="stat-sep">·</div>
            <div class="stat-chip">⬤ <span class="stat-val" id="stat-left">19</span> left</div>
        </div>

        <!-- Next Target -->
        <div class="next-target">
            <span class="next-arrow">→</span>
            <span id="next-target">TG/OC DR</span>
        </div>

    </div>

    <!-- Log Button -->
    <button class="btn" id="btn-log" onclick="clockIn()">LOG NOW</button>

    <!-- Sync Banner -->
    <div class="sync-banner" id="sync-banner">SYNC ACTIVE</div>
</div>

<!-- 2. SETTINGS VIEW -->
<div id="view-settings" class="view">
    <div class="scrollable">
        <div class="settings-title">Preferences</div>
        <div class="field-label">Sync Topic ID</div>
        <input type="text" id="topic-input" placeholder="e.g. patrol-abc123" autocorrect="off" autocapitalize="none">
        <button class="btn btn-secondary" id="btn-save-topic" style="padding: 11px 0; font-size: 13px; margin-bottom: 0;" onclick="saveWatchTopic()">Save Topic</button>
        <div class="divider"></div>
        <div class="field-label danger">Reset Patrol Route</div>
        <select id="reset-select" class="watch-select"></select>
        <button class="btn btn-danger" id="btn-reset" style="padding: 11px 0; width:100%; cursor:pointer;" onclick="executeReset()">Confirm Reset</button>
        <div style="height: 12px;"></div>
        <button class="btn btn-secondary" style="border:none;" onclick="hideSettings()">← Back</button>
    </div>
</div>

<!-- 3. COMPLETE VIEW -->
<div id="view-complete" class="view" style="justify-content: center;">
    <div class="target-card done" style="align-items:center; text-align:center; justify-content:center; gap:6px;">
        <div class="complete-icon">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="var(--green)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
        </div>
        <div class="target-name" style="font-size:26px;">Complete</div>
        <div class="next-target" style="color:rgba(255,255,255,0.6); justify-content:center;">Route Finished!</div>
    </div>
    <button class="btn btn-secondary" onclick="showSettings()">Reset Route</button>
</div>

<script>
    // ROUTE DATA
    var ROUTE_POINTS = ["BME","TG/OC DR","CY","E1/HTTC","FC","N1","S2","S1/S8","TG / OC DR","CY","BME","S1/S8","S2","N1","FC","HTCC / E1","OC DR","TG","BME"];

    // STATE
    var currentIndex = 0;
    var startIndex = 0;
    var isFinished = false;
    var sessionId = 0;

    var syncTopic = "patrol-xib0nj29";

    // LOAD STATE
    try {
        var _ci = localStorage.getItem('wPatrolCurrent');
        if (_ci) currentIndex = parseInt(_ci, 10);
        var _si = localStorage.getItem('wPatrolStart');
        if (_si) startIndex = parseInt(_si, 10);
        var _sid = localStorage.getItem('wPatrolSessionId');
        if (_sid) sessionId = parseInt(_sid, 10);
        var _f = localStorage.getItem('wPatrolFinished');
        if (_f === 'true') isFinished = true;
        var _topic = localStorage.getItem('wPatrolTopic');
        if (_topic) syncTopic = _topic;
        else localStorage.setItem('wPatrolTopic', syncTopic);
    } catch(e) {}

    // LIVE CLOCK
    function updateClock() {
        var d = new Date();
        document.getElementById('clock').innerText =
            d.getHours().toString().padStart(2,'0') + ':' +
            d.getMinutes().toString().padStart(2,'0');
    }
    setInterval(updateClock, 1000); updateClock();

    // ELAPSED SINCE LAST LOG
    function updateElapsed() {
        var chip = document.getElementById('elapsed-chip');
        if (!chip) return;
        try {
            var last = localStorage.getItem('wPatrolLastLog');
            if (last) {
                var mins = Math.floor((Date.now() - parseInt(last, 10)) / 60000);
                chip.innerText = mins + 'm';
                // colour: green < 15m, amber < 30m, red >= 30m
                if (mins < 15) {
                    chip.style.color = 'var(--green)';
                    chip.style.background = 'rgba(61,220,132,0.1)';
                    chip.style.borderColor = 'rgba(61,220,132,0.25)';
                } else if (mins < 30) {
                    chip.style.color = 'var(--amber)';
                    chip.style.background = 'rgba(255,179,64,0.1)';
                    chip.style.borderColor = 'rgba(255,179,64,0.25)';
                } else {
                    chip.style.color = 'var(--red)';
                    chip.style.background = 'rgba(255,92,92,0.1)';
                    chip.style.borderColor = 'rgba(255,92,92,0.25)';
                }
            } else {
                chip.innerText = '–m';
            }
        } catch(e) {}
    }
    setInterval(updateElapsed, 30000); updateElapsed();

    // INIT SELECT
    function initSelect() {
        var sel = document.getElementById('reset-select');
        var html = '<option value="0">1st Half (Default)</option>';
        html += '<option value="10">2nd Half Only</option>';
        for (var i = 0; i < ROUTE_POINTS.length; i++) {
            html += '<option value="' + i + '">Custom: Pt ' + (i+1) + ' (' + ROUTE_POINTS[i] + ')</option>';
        }
        sel.innerHTML = html;
    }
    initSelect();

    // UPDATE UI
    function renderUI() {
        var totalActive = ROUTE_POINTS.length - startIndex;
        var cleared = currentIndex - startIndex;
        var pct = totalActive > 0 ? Math.round((cleared / totalActive) * 100) : 0;

        if (currentIndex >= ROUTE_POINTS.length || isFinished) {
            document.getElementById('view-active').classList.remove('active');
            document.getElementById('view-settings').classList.remove('active');
            document.getElementById('view-complete').classList.add('active');
        } else {
            document.getElementById('view-complete').classList.remove('active');
            document.getElementById('view-settings').classList.remove('active');
            document.getElementById('view-active').classList.add('active');

            document.getElementById('target-name').innerText = ROUTE_POINTS[currentIndex];
            document.getElementById('prog-text').innerText = cleared + '/' + totalActive;
            document.getElementById('stat-cleared').innerText = cleared;
            document.getElementById('stat-left').innerText = totalActive - cleared;

            // Progress fills
            var fillPct = pct + '%';
            document.getElementById('route-prog-fill').style.width = fillPct;
            document.getElementById('mini-prog-fill').style.width = fillPct;

            if (currentIndex + 1 < ROUTE_POINTS.length) {
                document.getElementById('next-target').innerText = ROUTE_POINTS[currentIndex + 1];
            } else {
                document.getElementById('next-target').innerText = 'Final Point!';
            }
        }
        updateElapsed();
    }

    // ── TRUE SYNC: SESSION ID PROTECTED (Prevents self-downgrading when phone is asleep) ──
    var watchStateEventSource = null;
    var syncInterval = null;

    function updateStateFromPhone(s) {
        if (typeof s.ci !== 'undefined') {
            
            // Is this a completely new session broadcast by the phone?
            var isNewSession = (s.sid && s.sid !== sessionId);
            // Fallback for older states that don't have SID yet, but clearly represent a reset
            var isFallbackReset = (!s.sid && s.ci === s.si && s.ci < currentIndex);

            // If the phone is sending a state that is completely older than ours, and it is NOT a new session
            // then it means the phone is currently "asleep" and sending stale state.
            // We MUST ignore this stale state so the Watch doesn't rollback to 0!
            if (!isNewSession && !isFallbackReset && s.ci < currentIndex) {
                return; // Ignore stale broadcast!
            }


            // Only update if there is a legitimate change
            if (currentIndex !== s.ci || startIndex !== s.si || isFinished !== s.f) {
                
                // If phone advanced the checkpoint, reset the local elapsed timer
                if (s.ci > currentIndex) {
                    try { localStorage.setItem('wPatrolLastLog', Date.now()); } catch(e){}
                }

                currentIndex = s.ci;
                startIndex = s.si;
                isFinished = s.f;
                if (s.sid) sessionId = s.sid; // Inherit phone's session ID
                
                try {
                    localStorage.setItem('wPatrolStart', startIndex);
                    localStorage.setItem('wPatrolCurrent', currentIndex);
                    localStorage.setItem('wPatrolFinished', isFinished);
                    localStorage.setItem('wPatrolSessionId', sessionId);
                } catch(e){}
                
                renderUI();
                
                var sb = document.getElementById('sync-banner');
                if (sb) {
                    sb.innerText = "SYNCED WITH PHONE";
                    sb.style.color = "var(--blue)";
                    sb.style.opacity = "0.9";
                    setTimeout(function(){
                        sb.innerText = "SYNC ACTIVE";
                        sb.style.color = "var(--green)";
                        sb.style.opacity = "0.35";
                    }, 2000);
                }
            }
        }
    }

// ── FORCE CATCH UP ──
// Fetches all state messages from the last 12 hours to ensure the watch
// doesn't miss any updates if the SSE connection was suspended. This uses
// the since=12h parameter similar to the phone app’s catch‑up function.
function forceCatchUp() {
    if (!syncTopic) return;
    var topicClean = syncTopic.trim() + '-state';
    var url = 'https://ntfy.sh/' + topicClean + '/json?poll=1&since=12h';
    fetch(url, {
        headers: { 'Cache-Control': 'no-cache, no-store, must-revalidate' }
    })
    .then(function(res) { return res.text(); })
    .then(function(body) {
        if (!body) return;
        var lines = body.trim().split('\n');
        // Iterate through all messages and apply the latest state
        for (var i = 0; i < lines.length; i++) {
            if (!lines[i]) continue;
            try {
                var msg = JSON.parse(lines[i]);
                if (msg && msg.message) {
                    var s = JSON.parse(msg.message);
                    updateStateFromPhone(s);
                }
            } catch(e) {}
        }
    })
    .catch(function() {});
}

    function fetchLatestState() {
        if (!syncTopic) return;
        var topicClean = syncTopic.trim() + '-state';
        var cb = Date.now(); // Cache Buster guarantees fresh data from server
        fetch('https://ntfy.sh/' + topicClean + '/json?poll=1&cb=' + cb, {
            headers: { 'Cache-Control': 'no-cache, no-store, must-revalidate' }
        })
        .then(function(res){ return res.text(); })
        .then(function(body){
            if (body) {
                var lines = body.trim().split('\n');
                var validLines = lines.filter(function(l){ return l.length > 0; });
                if (validLines.length > 0) {
                    try {
                        var msg = JSON.parse(validLines[validLines.length-1]);
                        if (msg && msg.message) {
                            var s = JSON.parse(msg.message);
                            updateStateFromPhone(s);
                        }
                    } catch(e){}
                }
            }
        }).catch(function(){});
    }

    function startStateSync() {
        if (watchStateEventSource) { watchStateEventSource.close(); watchStateEventSource = null; }
        if (syncInterval) { clearInterval(syncInterval); }
        if (!syncTopic) return;
        
        var topicClean = syncTopic.trim() + '-state';
        
        // 1. Force a catch‑up sweep immediately to ensure we process any
        // messages that arrived while the watch was asleep. This calls
        // since=12h to fetch all recent state messages.
        forceCatchUp();

        // 2. Also perform the lightweight fetchLatestState() to maintain
        // low‑latency updates; this ensures we always check for new
        // messages after the initial sweep.
        fetchLatestState();

        // 3. Set an aggressive polling fallback. WatchOS will pause this when asleep, 
        // and immediately run it when waking up to guarantee a fresh state.
        syncInterval = setInterval(function(){
            // Use fetchLatestState to reduce data usage; occasionally call
            // forceCatchUp() every 5 polls to perform a full sweep.
            fetchLatestState();
        }, 8000);

        // 3. Set up SSE for live instant updates while screen is ON
        try {
            watchStateEventSource = new EventSource('https://ntfy.sh/' + topicClean + '/sse');
            watchStateEventSource.onmessage = function(e) {
                try {
                    var msg = JSON.parse(e.data);
                    if (msg && msg.event === 'message' && msg.message) {
                        var s = JSON.parse(msg.message);
                        updateStateFromPhone(s);
                    }
                } catch(err){}
            };
            watchStateEventSource.onerror = function() {
                if (watchStateEventSource) watchStateEventSource.close();
            };
        } catch(e) {}
    }

    startStateSync();
    
    // Aggressively trigger fetch when watch screen wakes up or focuses
    document.addEventListener("visibilitychange", function() {
        if (document.visibilityState === 'visible') fetchLatestState();
    });
    window.addEventListener("focus", fetchLatestState);
    window.addEventListener("pageshow", fetchLatestState);

    // ── CLOCK IN ──
    function clockIn() {
        var btn = document.getElementById('btn-log');
        btn.innerText = "SENDING…";
        btn.style.opacity = "0.7";
        if (navigator.vibrate) navigator.vibrate([50]);
        var topicClean = syncTopic.trim();

        // Send the trigger using navigator.sendBeacon to improve reliability when the
        // watch face goes to the background. sendBeacon returns a boolean
        // indicating whether the data was queued for sendinghttps://firt.dev/understanding-js-background/#:~:text=,returns%20to%20the%20web%20app.
        var payload = JSON.stringify({ trigger: true, time: Math.floor(Date.now() / 1000) });
        var success = false;
        try {
            success = navigator.sendBeacon('https://ntfy.sh/' + topicClean, payload);
        } catch (err) {
            success = false;
        }
        if (success) {
            if (navigator.vibrate) navigator.vibrate([100]);
            // Record last log time but let the phone update the index; do not increment
            try { localStorage.setItem('wPatrolLastLog', Date.now()); } catch(e){}
            // Provide visual feedback
            btn.innerText = "✅ SENT!";
            btn.style.opacity = "1";
            btn.style.background = "linear-gradient(135deg, #3ddc84, #1aab60)";
            btn.style.boxShadow = "0 4px 16px rgba(61,220,132,0.3)";
            // Restore button text after a moment
            setTimeout(function(){
                btn.innerText = "LOG NOW";
                btn.style.background = "linear-gradient(135deg, #5fa3ff, #1a5fd4)";
                btn.style.boxShadow = "0 4px 16px rgba(45,126,255,0.3)";
            }, 1500);
            // Force a state check after a short delay so we pick up the phone's response
            setTimeout(function(){
                fetchLatestState();
                forceCatchUp();
            }, 2000);
        } else {
            btn.innerText = "❌ FAILED";
            btn.style.opacity = "1";
            btn.style.background = "var(--red)";
            btn.style.boxShadow = "none";
            setTimeout(function(){
                btn.innerText = "LOG NOW";
                btn.style.background = "linear-gradient(135deg, #5fa3ff, #1a5fd4)";
                btn.style.boxShadow = "0 4px 16px rgba(45,126,255,0.3)";
            }, 2000);
        }
    }

    // ── SETTINGS ──
    function showSettings() {
        document.getElementById('topic-input').value = syncTopic;
        document.getElementById('reset-select').value = startIndex;
        document.getElementById('view-active').classList.remove('active');
        document.getElementById('view-complete').classList.remove('active');
        document.getElementById('view-settings').classList.add('active');
    }

    function hideSettings() { renderUI(); }

    function saveWatchTopic() {
        var inputTopic = document.getElementById('topic-input').value.trim();
        syncTopic = inputTopic;
        try { localStorage.setItem('wPatrolTopic', syncTopic); } catch(e){}
        var btn = document.getElementById('btn-save-topic');
        var oldTxt = btn.innerText;
        btn.innerText = "✅ Saved";
        btn.style.background = "rgba(61,220,132,0.2)";
        btn.style.color = "var(--green)";
        btn.style.border = "1px solid var(--green)";
        setTimeout(function(){
            btn.innerText = oldTxt;
            btn.style.background = "var(--surface)";
            btn.style.color = "#fff";
            btn.style.border = "1px solid var(--border)";
        }, 1000);
        startStateSync();
    }

    function executeReset() {
        var val = document.getElementById('reset-select').value;
        var newStart = parseInt(val, 10);
        var btn = document.getElementById('btn-reset');
        var oldTxt = btn.innerText;
        btn.innerText = "SENDING…";

        // Use navigator.sendBeacon to send the reset command reliably even if the
        // watch face goes into the backgroundhttps://firt.dev/understanding-js-background/#:~:text=,returns%20to%20the%20web%20app.
        var payload = JSON.stringify({ trigger: false, reset: true, startIdx: newStart });
        var success = false;
        try {
            success = navigator.sendBeacon('https://ntfy.sh/' + syncTopic.trim(), payload);
        } catch (err) {
            success = false;
        }
        if (success) {
            if (navigator.vibrate) navigator.vibrate(50);
            // Update local state immediately and clear last log, but rely on phone for
            // subsequent state broadcasting.
            startIndex = newStart;
            currentIndex = newStart;
            isFinished = false;
            try { localStorage.removeItem('wPatrolLastLog'); } catch(e){}
            renderUI();
            btn.innerText = "✅ Reset Done!";
            btn.style.background = "var(--green)";
            btn.style.color = "#fff";
            btn.style.borderColor = "var(--green)";
            setTimeout(function(){
                btn.innerText = oldTxt;
                btn.style.background = "rgba(255,92,92,0.12)";
                btn.style.color = "var(--red)";
                btn.style.borderColor = "rgba(255,92,92,0.28)";
                hideSettings();
            }, 800);
            setTimeout(function(){
                fetchLatestState();
                forceCatchUp();
            }, 2000);
        } else {
            btn.innerText = "❌ FAILED";
            setTimeout(function(){ btn.innerText = oldTxt; }, 1500);
        }
    }

    // INIT
    renderUI();
</script>
</body>
