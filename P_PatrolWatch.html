<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Watch Patrol</title>
    <!-- Import identical fonts to the main app -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --blue: #5fa3ff;
            --blue-glow: rgba(95,163,255,0.35);
            --green: #3ddc84;
            --green-glow: rgba(61,220,132,0.35);
            --red: #ff5c5c;
            --surface: #1c1c1e;
            --border: #2c2c2e;
            --muted: #8e8e93;
            --display: 'Syne', sans-serif;
            --mono: 'JetBrains Mono', monospace;
        }

        /* OLED Optimized Apple Watch Theme */
        body {
            background-color: #000000;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 16px 12px;
            height: 100vh;
            display: flex;
            flex-direction: column;
            box-sizing: border-box;
            overflow: hidden;
        }

        /* Views */
        .view { display: none; flex-direction: column; height: 100%; width: 100%; }
        .view.active { display: flex; }

        /* Header */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }
        .clock { 
            font-family: var(--mono); 
            font-size: 16px; 
            font-weight: 700; 
            color: var(--blue); 
            letter-spacing: 1px;
        }
        .prog-pill { 
            font-family: var(--mono); 
            font-size: 12px; 
            font-weight: 700; 
            color: #fff; 
            background: rgba(255,255,255,0.12);
            border: 1px solid rgba(255,255,255,0.2);
            padding: 4px 10px;
            border-radius: 12px;
        }
        .gear-btn {
            background: var(--surface); 
            border: 1px solid var(--border); 
            border-radius: 50%; 
            color: var(--muted); 
            font-size: 14px; 
            width: 30px; 
            height: 30px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            cursor: pointer;
        }

        /* Target Card (Redesigned to match main app) */
        .target-card {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, rgba(45,126,255,0.15), rgba(45,126,255,0.03));
            border-radius: 20px;
            padding: 15px;
            margin-bottom: 16px;
            border: 1px solid rgba(45,126,255,0.3);
            box-shadow: 0 0 20px rgba(45,126,255,0.1);
            text-align: center;
            position: relative;
            overflow: hidden;
        }
        
        .target-card.done { 
            background: linear-gradient(135deg, rgba(61,220,132,0.15), rgba(61,220,132,0.03));
            border-color: rgba(61,220,132,0.4); 
            box-shadow: 0 0 20px rgba(61,220,132,0.15);
        }

        /* Glowing Pulse Dot */
        .label-wrap {
            display: flex;
            align-items: center;
            gap: 6px;
            margin-bottom: 8px;
        }
        .dot-pulse {
            width: 6px; height: 6px;
            border-radius: 50%;
            background: var(--blue);
            box-shadow: 0 0 6px var(--blue);
            animation: dotPulse 1.5s ease-in-out infinite;
        }
        @keyframes dotPulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50%      { opacity: 0.4; transform: scale(0.8); }
        }

        .label { 
            font-family: var(--mono);
            font-size: 10px; 
            font-weight: 700; 
            color: var(--blue); 
            letter-spacing: 1.5px; 
            text-transform: uppercase; 
        }
        
        .target-name { 
            font-family: var(--display);
            font-size: 34px; 
            font-weight: 800; 
            margin: 0; 
            line-height: 1.1; 
            color: #fff; 
            letter-spacing: -0.5px;
        }
        
        .next-target { 
            font-family: var(--mono);
            font-size: 11px; 
            color: rgba(255,255,255,0.5); 
            margin-top: 8px; 
        }

        /* Massive Buttons (Redesigned) */
        .btn {
            background: linear-gradient(135deg, #5fa3ff, #1a5fd4);
            color: #fff;
            border: none;
            border-radius: 20px;
            font-family: var(--display);
            font-size: 18px;
            font-weight: 800;
            padding: 18px 0;
            width: 100%;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 6px 20px rgba(45,126,255,0.35);
            transition: transform 0.1s, box-shadow 0.2s;
        }
        .btn:active { transform: scale(0.95); box-shadow: 0 2px 10px rgba(45,126,255,0.3); }
        
        .btn-secondary { 
            background: var(--surface); 
            color: #fff; 
            font-family: -apple-system, sans-serif;
            font-size: 14px; 
            font-weight: 600;
            padding: 14px 0; 
            border-radius: 16px; 
            text-transform: none;
            box-shadow: none;
            border: 1px solid var(--border);
            letter-spacing: 0;
        }
        .btn-danger { 
            background: rgba(255,92,92,0.15); 
            color: var(--red); 
            border: 1px solid rgba(255,92,92,0.3);
            border-radius: 16px; 
            text-transform: none; 
            font-size: 15px;
            box-shadow: none;
        }
        
        /* Watch specific Select Input */
        .watch-select {
            background: var(--surface);
            color: #fff;
            border: 1px solid var(--border);
            border-radius: 14px;
            font-size: 14px;
            font-weight: 600;
            padding: 12px 10px;
            width: 100%;
            margin-bottom: 12px;
            text-align: center;
            appearance: none;
            -webkit-appearance: none;
        }

        /* Settings View Elements */
        .settings-title { font-family: var(--display); font-size: 18px; font-weight: 800; margin-bottom: 15px; text-align: center; }
        input[type="text"] {
            width: 100%; box-sizing: border-box; padding: 12px; border-radius: 14px;
            background: var(--surface); border: 1px solid var(--border); color: #fff; font-family: var(--mono); font-size: 14px;
            margin-bottom: 10px; text-align: center;
        }
        .scrollable { overflow-y: auto; flex: 1; padding-bottom: 30px; }
        .scrollable::-webkit-scrollbar { display: none; }
        
        .divider { height: 1px; background: var(--border); margin: 16px 0; }
        
        /* Status Banner */
        .sync-banner {
            font-size: 9px; color: var(--green); text-align: center; margin-top: 8px; font-family: var(--mono); letter-spacing: 1px; opacity: 0.4; transition: all 0.3s;
        }
        
        /* Complete Icon Glow */
        .complete-icon {
            width: 60px; height: 60px;
            border-radius: 50%;
            border: 2px solid var(--green);
            background: rgba(61,220,132,0.15);
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 12px;
            box-shadow: 0 0 24px var(--green-glow);
        }
    </style>
</head>
<body>

    <!-- 1. ACTIVE PATROL VIEW -->
    <div id="view-active" class="view active">
        <div class="header">
            <div class="clock" id="clock">00:00</div>
            <div class="prog-pill" id="prog-text">1/19</div>
            <button class="gear-btn" onclick="showSettings()">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
            </button>
        </div>

        <div class="target-card" id="target-card">
            <div class="label-wrap">
                <div class="dot-pulse"></div>
                <div class="label" id="target-label">Current Target</div>
            </div>
            <div class="target-name" id="target-name">BME</div>
            <div class="next-target" id="next-target">Then: TG/OC DR</div>
        </div>

        <button class="btn" id="btn-log" onclick="clockIn()">LOG NOW</button>
        <div class="sync-banner" id="sync-banner">SYNC ACTIVE</div>
    </div>

    <!-- 2. SETTINGS VIEW -->
    <div id="view-settings" class="view">
        <div class="scrollable">
            <div class="settings-title">Preferences</div>
            
            <div style="font-size: 10px; color: var(--muted); margin-bottom: 6px; text-align: center; text-transform: uppercase; font-weight: 700; letter-spacing: 1px;">Sync Topic ID</div>
            <input type="text" id="topic-input" placeholder="e.g. patrol-abc123" autocorrect="off" autocapitalize="none">
            <button class="btn btn-secondary" id="btn-save-topic" style="padding: 12px 0; font-size: 13px;" onclick="saveWatchTopic()">Save Topic</button>
            
            <div class="divider"></div>
            
            <div style="font-size: 10px; color: var(--red); margin-bottom: 6px; text-align: center; text-transform: uppercase; font-weight: 700; letter-spacing: 1px;">Reset Patrol Route</div>
            
            <select id="reset-select" class="watch-select">
                <!-- Javascript will inject options here -->
            </select>
            
            <button class="btn btn-danger" id="btn-reset" style="padding: 12px 0;" onclick="executeReset()">Confirm Reset</button>
            
            <div style="height: 20px;"></div>
            <button class="btn btn-secondary" style="border:none;" onclick="hideSettings()">← Back</button>
        </div>
    </div>

    <!-- 3. COMPLETE VIEW -->
    <div id="view-complete" class="view" style="justify-content: center;">
        <div class="target-card done">
            <div class="complete-icon">
                <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="var(--green)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
            </div>
            <div class="target-name" style="font-size:28px;">Complete</div>
            <div class="next-target" style="color:rgba(255,255,255,0.7);">Route Finished!</div>
        </div>
        <button class="btn btn-secondary" onclick="showSettings()">Reset Route</button>
    </div>

    <script>
        // ROUTE DATA
        var ROUTE_POINTS = ["BME","TG/OC DR","CY","E1/HTTC","FC","N1","S2","S1/S8","TG / OC DR","CY","BME","S1/S8","S2","N1","FC","HTCC / E1","OC DR","TG","BME"];
        
        // STATE
        var currentIndex = 0;
        var startIndex = 0;
        var isFinished = false;
        
        // --- HARDCODED TOPIC ID ---
        var syncTopic = "patrol-xib0nj29";

        // LOAD STATE
        try {
            var _ci = localStorage.getItem('wPatrolCurrent');
            if (_ci) currentIndex = parseInt(_ci, 10);
            
            var _si = localStorage.getItem('wPatrolStart');
            if (_si) startIndex = parseInt(_si, 10);
            
            var _f = localStorage.getItem('wPatrolFinished');
            if (_f === 'true') isFinished = true;
            
            var _topic = localStorage.getItem('wPatrolTopic');
            if (_topic) syncTopic = _topic;
            else localStorage.setItem('wPatrolTopic', syncTopic);
        } catch(e) {}

        // LIVE CLOCK
        function updateClock() {
            var d = new Date();
            document.getElementById('clock').innerText = d.getHours().toString().padStart(2,'0') + ':' + d.getMinutes().toString().padStart(2,'0');
        }
        setInterval(updateClock, 1000); updateClock();

        // INIT SELECT DROPDOWN
        function initSelect() {
            var sel = document.getElementById('reset-select');
            var html = '<option value="0">1st Half (Default)</option>';
            html += '<option value="10">2nd Half Only</option>';
            for(var i = 0; i < ROUTE_POINTS.length; i++) {
                html += '<option value="' + i + '">Custom: Pt ' + (i+1) + ' (' + ROUTE_POINTS[i] + ')</option>';
            }
            sel.innerHTML = html;
        }
        initSelect();

        // UPDATE UI
        function renderUI() {
            var totalActive = ROUTE_POINTS.length - startIndex;
            var cleared = currentIndex - startIndex;
            
            if (currentIndex >= ROUTE_POINTS.length || isFinished) {
                document.getElementById('view-active').classList.remove('active');
                document.getElementById('view-settings').classList.remove('active');
                document.getElementById('view-complete').classList.add('active');
            } else {
                document.getElementById('view-complete').classList.remove('active');
                document.getElementById('view-settings').classList.remove('active');
                document.getElementById('view-active').classList.add('active');
                
                document.getElementById('target-name').innerText = ROUTE_POINTS[currentIndex];
                document.getElementById('prog-text').innerText = cleared + '/' + totalActive;
                
                if (currentIndex + 1 < ROUTE_POINTS.length) {
                    document.getElementById('next-target').innerText = 'Then: ' + ROUTE_POINTS[currentIndex+1];
                } else {
                    document.getElementById('next-target').innerText = 'Final Point!';
                }
            }
        }

        // -----------------------------------------------------
        // TRUE SYNC: CACHE-BUSTED LIVE SSE RECEIVER
        // -----------------------------------------------------
        var watchStateEventSource = null;

        function updateStateFromPhone(s) {
            if (typeof s.ci !== 'undefined') {
                if (currentIndex !== s.ci || startIndex !== s.si || isFinished !== s.f) {
                    currentIndex = s.ci;
                    startIndex = s.si;
                    isFinished = s.f;
                    try { 
                        localStorage.setItem('wPatrolStart', startIndex); 
                        localStorage.setItem('wPatrolCurrent', currentIndex); 
                        localStorage.setItem('wPatrolFinished', isFinished); 
                    } catch(e){}
                    renderUI();
                    
                    // Show a quick visual indication that sync happened
                    var sb = document.getElementById('sync-banner');
                    if(sb) {
                        sb.innerText = "SYNCED WITH PHONE";
                        sb.style.color = "var(--blue)";
                        sb.style.opacity = "0.9";
                        setTimeout(function(){
                            sb.innerText = "SYNC ACTIVE";
                            sb.style.color = "var(--green)";
                            sb.style.opacity = "0.4";
                        }, 2000);
                    }
                }
            }
        }

        function startStateSync() {
            if (watchStateEventSource) { watchStateEventSource.close(); watchStateEventSource = null; }
            if (!syncTopic) return;
            
            var topicClean = syncTopic.trim() + '-state';
            
            // 1. Initial catch-up with CACHE-BUSTER (Kills Safari Cache bug)
            var cb = Date.now();
            fetch('https://ntfy.sh/' + topicClean + '/json?poll=1&cb=' + cb, { cache: 'no-store' })
                .then(function(res){ return res.text(); })
                .then(function(body){
                    if (body) {
                        var lines = body.trim().split('\n');
                        var validLines = lines.filter(function(l) { return l.length > 0; });
                        if (validLines.length > 0) {
                            try {
                                var msg = JSON.parse(validLines[validLines.length-1]);
                                if (msg && msg.message) {
                                    var s = JSON.parse(msg.message);
                                    updateStateFromPhone(s);
                                }
                            } catch(e) {}
                        }
                    }
                    
                    // 2. Open Live Connection (SSE) for instant pushes
                    watchStateEventSource = new EventSource('https://ntfy.sh/' + topicClean + '/sse');
                    watchStateEventSource.onmessage = function(e) {
                        try {
                            var msg = JSON.parse(e.data);
                            if (msg && msg.event === 'message' && msg.message) {
                                var s = JSON.parse(msg.message);
                                updateStateFromPhone(s);
                            }
                        } catch(err) {}
                    };
                }).catch(function(){});
        }

        // Initialize sync on load and whenever Watch Screen wakes up
        startStateSync();
        document.addEventListener("visibilitychange", function() {
            if (document.visibilityState === 'visible') startStateSync();
        });


        // -----------------------------------------------------
        // CLOCK IN LOGIC (CORS BYPASS TO PHONE)
        // -----------------------------------------------------
        function clockIn() {
            var btn = document.getElementById('btn-log');
            btn.innerText = "SENDING...";
            btn.style.opacity = "0.7";
            
            if (navigator.vibrate) navigator.vibrate([50]);
            var topicClean = syncTopic.trim();
            
            // mode: 'no-cors' allows this request to bypass security restrictions on Apple Watch Safari
            fetch('https://ntfy.sh/' + topicClean, {
                method: 'POST',
                mode: 'no-cors',
                body: JSON.stringify({ trigger: true, time: Math.floor(Date.now() / 1000) })
            }).then(function() {
                if (navigator.vibrate) navigator.vibrate([100]);
                
                // Optimistic visual update
                currentIndex++;
                if (currentIndex >= ROUTE_POINTS.length) isFinished = true;
                try { localStorage.setItem('wPatrolCurrent', currentIndex); } catch(e){}
                renderUI();
                
                btn.innerText = "✅ SENT!";
                btn.style.background = "var(--green)";
                btn.style.boxShadow = "0 6px 20px rgba(61,220,132,0.3)";
                
                setTimeout(function(){ 
                    btn.innerText = "LOG NOW"; 
                    btn.style.opacity = "1";
                    btn.style.background = "linear-gradient(135deg, #5fa3ff, #1a5fd4)";
                    btn.style.boxShadow = "0 6px 20px rgba(45,126,255,0.35)";
                }, 1500);

                // Check with phone 2 seconds later to verify it was received
                setTimeout(startStateSync, 2000);
            }).catch(function(err) {
                btn.innerText = "❌ FAILED";
                btn.style.background = "var(--red)";
                btn.style.boxShadow = "none";
                setTimeout(function(){ 
                    btn.innerText = "LOG NOW"; 
                    btn.style.opacity = "1";
                    btn.style.background = "linear-gradient(135deg, #5fa3ff, #1a5fd4)";
                    btn.style.boxShadow = "0 6px 20px rgba(45,126,255,0.35)";
                }, 2000);
            });
        }

        // -----------------------------------------------------
        // NAVIGATION & SETTINGS
        // -----------------------------------------------------
        function showSettings() {
            document.getElementById('topic-input').value = syncTopic;
            document.getElementById('reset-select').value = startIndex;
            
            document.getElementById('view-active').classList.remove('active');
            document.getElementById('view-complete').classList.remove('active');
            document.getElementById('view-settings').classList.add('active');
        }

        function hideSettings() {
            renderUI();
        }

        function saveWatchTopic() {
            var inputTopic = document.getElementById('topic-input').value.trim();
            syncTopic = inputTopic;
            try { localStorage.setItem('wPatrolTopic', syncTopic); } catch(e){}
            
            var btn = document.getElementById('btn-save-topic');
            var oldTxt = btn.innerText;
            btn.innerText = "✅ Saved";
            btn.style.background = "rgba(61,220,132,0.2)";
            btn.style.color = "var(--green)";
            btn.style.border = "1px solid var(--green)";
            setTimeout(function(){
                btn.innerText = oldTxt;
                btn.style.background = "var(--surface)";
                btn.style.color = "#fff";
                btn.style.border = "1px solid var(--border)";
            }, 1000);
            
            startStateSync(); // Restart sync to the new topic
        }

        // COMMAND PHONE TO RESET
        function executeReset() {
            var val = document.getElementById('reset-select').value;
            var newStart = parseInt(val, 10);
            
            var btn = document.getElementById('btn-reset');
            var oldTxt = btn.innerText;
            btn.innerText = "SENDING...";
            
            // Tell the phone app to execute a reset sequence
            fetch('https://ntfy.sh/' + syncTopic.trim(), {
                method: 'POST',
                mode: 'no-cors',
                body: JSON.stringify({ trigger: false, reset: true, startIdx: newStart })
            }).then(function() {
                if (navigator.vibrate) navigator.vibrate(50);
                
                // Optimistic visual update
                startIndex = newStart;
                currentIndex = newStart;
                isFinished = false;
                renderUI();

                btn.innerText = "✅ Reset Done!";
                btn.style.background = "var(--green)";
                btn.style.color = "#fff";
                btn.style.borderColor = "var(--green)";
                
                setTimeout(function(){
                    btn.innerText = oldTxt;
                    btn.style.background = "rgba(255,92,92,0.15)";
                    btn.style.color = "var(--red)";
                    btn.style.borderColor = "rgba(255,92,92,0.3)";
                    hideSettings();
                }, 800);
                
            }).catch(function(){
                btn.innerText = "❌ FAILED";
                setTimeout(function(){ btn.innerText = oldTxt; }, 1500);
            });
        }

        // INIT
        renderUI();
    </script>
</body>
</html>
