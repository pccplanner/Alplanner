<!DOCTYPE html>

<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Patrol Route System</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

<style>
    :root {
        --bg:        #2c2e32;
        --surface:   #34363b;
        --card:      #3c3f45;
        --border:    #52565e;
        --blue:      #5fa3ff;
        --blue-glow: rgba(95,163,255,0.4);
        --green:     #3ddc84;
        --green-glow:rgba(61,220,132,0.35);
        --amber:     #ffbb33;
        --red:       #ff5c5c;
        --text:      #f2f4f8;
        --muted:     #b0b5c0;
        --mono:      'JetBrains Mono', monospace;
        --sans:      'DM Sans', sans-serif;
        --display:   'Syne', sans-serif;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; font-stretch: normal; }
    html { scroll-behavior: smooth; }

    body {
        background: var(--bg);
        color: var(--text);
        font-family: var(--sans);
        min-height: 100vh;
        overflow-x: hidden;
    }

    /* ── BACKGROUND GRID ── */
    body::before {
        content: '';
        position: fixed;
        inset: 0;
        background-image:
            linear-gradient(rgba(255,255,255,0.04) 1px, transparent 1px),
            linear-gradient(90deg, rgba(255,255,255,0.04) 1px, transparent 1px);
        background-size: 40px 40px;
        pointer-events: none;
        z-index: 0;
    }

    /* ── HEADER ── */
    header {
        position: sticky;
        top: 0;
        z-index: 100;
        background: rgba(44,46,50,0.94);
        backdrop-filter: blur(16px);
        border-bottom: 1px solid var(--border);
        padding: 0 24px;
        height: 64px;
        display: flex;
        align-items: center;
        justify-content: space-between;
    }

    .header-brand {
        display: flex;
        align-items: center;
        gap: 12px;
        font-family: var(--display);
        font-weight: 800;
        font-size: 18px;
        letter-spacing: -0.3px;
    }

    .brand-icon {
        width: 36px; height: 36px;
        background: linear-gradient(135deg, var(--blue), #5b9fff);
        border-radius: 10px;
        display: flex; align-items: center; justify-content: center;
        box-shadow: 0 0 16px var(--blue-glow);
    }

    .brand-icon svg { width: 20px; height: 20px; stroke: white; fill: none; }

    /* ── LIVE CLOCK in header ── */
    .header-clock {
        text-align: right;
    }

    .clock-time {
        font-family: var(--mono);
        font-size: 20px;
        font-weight: 700;
        color: var(--blue);
        letter-spacing: 2px;
        line-height: 1;
    }

    .clock-date {
        font-size: 11px;
        color: var(--muted);
        margin-top: 2px;
        font-family: var(--sans);
    }

    /* ── MAIN LAYOUT ── */
    main {
        position: relative;
        z-index: 1;
        max-width: 1140px;
        margin: 0 auto;
        padding: 28px 20px;
        display: grid;
        grid-template-columns: 340px 1fr;
        gap: 24px;
    }

    @media (max-width: 900px) {
        main { grid-template-columns: 1fr; }
    }

    /* ── CARD ── */
    .card {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 20px;
        overflow: hidden;
    }

    .card-header {
        padding: 18px 22px 14px;
        border-bottom: 1px solid var(--border);
        display: flex;
        align-items: center;
        justify-content: space-between;
    }

    .card-title {
        font-family: var(--display);
        font-size: 13px;
        font-weight: 700;
        letter-spacing: 1.5px;
        text-transform: uppercase;
        color: var(--muted);
    }

    /* ── PROGRESS RING ── */
    .progress-ring-wrap {
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 28px 22px 20px;
        gap: 8px;
        min-width: 0;
    }

    .ring-container {
        position: relative;
        width: 140px;
        height: 140px;
        aspect-ratio: 1 / 1;
        flex-shrink: 0;
    }

    #progress-svg {
        transform: rotate(-90deg);
        width: 140px;
        height: 140px;
        aspect-ratio: 1 / 1;
        display: block;
        overflow: visible;
    }

    .ring-bg { fill: none; stroke: var(--border); stroke-width: 8; }
    .ring-fill {
        fill: none;
        stroke: url(#ringGrad);
        stroke-width: 8;
        stroke-linecap: round;
        stroke-dasharray: 351;
        stroke-dashoffset: 351;
        transition: stroke-dashoffset 0.8s cubic-bezier(0.4,0,0.2,1);
        filter: drop-shadow(0 0 6px var(--blue-glow));
    }

    .ring-label {
        position: absolute;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        pointer-events: none;
    }

    .ring-pct {
        font-family: var(--display);
        font-size: 28px;
        font-weight: 800;
        color: var(--text);
        line-height: 1;
        transition: all 0.4s;
    }

    .ring-sub {
        font-size: 10px;
        color: var(--muted);
        text-transform: uppercase;
        letter-spacing: 1px;
        margin-top: 2px;
    }

    /* ── STATS STRIP ── */
    .stats-strip {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 12px;
        padding: 0 22px 22px;
    }

    .stat-box {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 14px;
        text-align: center;
        position: relative;
        overflow: hidden;
    }

    .stat-box::after {
        content: '';
        position: absolute;
        bottom: 0; left: 0; right: 0;
        height: 2px;
        background: linear-gradient(90deg, var(--blue), transparent);
        opacity: 0;
        transition: opacity 0.3s;
    }

    .stat-box.updated::after { opacity: 1; animation: barFlash 0.6s forwards; }

    @keyframes barFlash {
        0%   { opacity: 1; }
        100% { opacity: 0; }
    }

    .stat-num {
        font-family: var(--display);
        font-size: 32px;
        font-weight: 800;
        color: var(--text);
        line-height: 1;
        transition: transform 0.2s, color 0.3s;
    }

    .stat-num.bump { animation: numBump 0.35s ease; }

    @keyframes numBump {
        0%   { transform: scale(1); }
        40%  { transform: scale(1.25); color: var(--blue); }
        100% { transform: scale(1); }
    }

    .stat-label {
        font-size: 10px;
        color: var(--muted);
        text-transform: uppercase;
        letter-spacing: 1px;
        margin-top: 4px;
    }

    /* ── TARGET / DIRECTION PANEL ── */
    .target-panel {
        padding: 20px 22px;
        border-bottom: 1px solid var(--border);
    }

    /* RADAR SCAN around current target */
    .radar-wrap {
        position: relative;
        margin-bottom: 16px;
    }

    .radar-ring {
        position: absolute;
        inset: -8px;
        border-radius: 18px;
        border: 1.5px solid var(--blue);
        opacity: 0;
        animation: radarPulse 2.2s ease-out infinite;
    }

    .radar-ring:nth-child(2) { animation-delay: 0.7s; }
    .radar-ring:nth-child(3) { animation-delay: 1.4s; }

    @keyframes radarPulse {
        0%   { opacity: 0.7; transform: scale(1); }
        100% { opacity: 0;   transform: scale(1.12); }
    }

    .target-box {
        background: linear-gradient(135deg, rgba(45,126,255,0.12), rgba(45,126,255,0.04));
        border: 1px solid rgba(45,126,255,0.35);
        border-radius: 14px;
        padding: 16px 18px;
        position: relative;
        overflow: hidden;
    }

    /* Scanning line */
    .target-box::before {
        content: '';
        position: absolute;
        left: 0; right: 0;
        height: 1.5px;
        background: linear-gradient(90deg, transparent, var(--blue), transparent);
        opacity: 0.6;
        animation: scanLine 2.5s linear infinite;
    }

    @keyframes scanLine {
        0%   { top: 0%; opacity: 0.8; }
        50%  { opacity: 0.4; }
        100% { top: 100%; opacity: 0; }
    }

    .target-label {
        font-size: 10px;
        font-family: var(--mono);
        color: var(--blue);
        letter-spacing: 2px;
        text-transform: uppercase;
        margin-bottom: 6px;
        display: flex;
        align-items: center;
        gap: 6px;
    }

    .dot-pulse {
        width: 7px; height: 7px;
        border-radius: 50%;
        background: var(--blue);
        box-shadow: 0 0 6px var(--blue);
        animation: dotPulse 1s ease-in-out infinite;
    }

    @keyframes dotPulse {
        0%, 100% { opacity: 1; transform: scale(1); }
        50%       { opacity: 0.4; transform: scale(0.7); }
    }

    .target-name {
        font-family: var(--display);
        font-size: 26px;
        font-weight: 800;
        color: #fff;
        letter-spacing: -0.5px;
        transition: opacity 0.2s;
    }

    /* direction breadcrumb */
    .direction-crumbs {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-top: 14px;
        font-size: 12px;
        color: var(--muted);
        font-family: var(--mono);
        overflow: hidden;
    }

    .crumb-done {
        color: var(--green);
        text-decoration: line-through;
        opacity: 0.7;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        max-width: 90px;
    }

    .crumb-arrow { color: var(--border); flex-shrink: 0; }

    .crumb-current {
        color: var(--blue);
        font-weight: 700;
        white-space: nowrap;
    }

    .crumb-next {
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        max-width: 90px;
    }

    /* ── CLOCK IN BUTTON ── */
    .clockin-wrap {
        padding: 0 22px 22px;
        position: relative;
    }

    .btn-clockin {
        width: 100%;
        background: linear-gradient(135deg, var(--blue), #1a5fd4);
        border: none;
        border-radius: 16px;
        color: white;
        font-family: var(--display);
        font-size: 17px;
        font-weight: 800;
        letter-spacing: 1px;
        padding: 18px;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
        box-shadow: 0 8px 32px rgba(45,126,255,0.35);
        transition: transform 0.15s, box-shadow 0.15s;
        position: relative;
        overflow: hidden;
    }

    .btn-clockin:hover {
        transform: translateY(-2px);
        box-shadow: 0 12px 40px rgba(45,126,255,0.5);
    }

    .btn-clockin:active { transform: scale(0.97); }

    /* Ripple */
    .btn-clockin .ripple {
        position: absolute;
        border-radius: 50%;
        background: rgba(255,255,255,0.25);
        transform: scale(0);
        animation: rippleAnim 0.6s linear forwards;
        pointer-events: none;
    }

    @keyframes rippleAnim {
        to { transform: scale(4); opacity: 0; }
    }

    /* Shimmer sweep */
    .btn-clockin::after {
        content: '';
        position: absolute;
        top: 0; left: -100%; width: 60%; height: 100%;
        background: linear-gradient(90deg, transparent, rgba(255,255,255,0.15), transparent);
        animation: shimmer 3s ease-in-out infinite;
    }

    @keyframes shimmer {
        0%   { left: -100%; }
        60%  { left: 150%; }
        100% { left: 150%; }
    }

    .btn-clockin svg { width: 22px; height: 22px; fill: white; flex-shrink: 0; }

    /* ── COMPLETED VIEW ── */
    .completed-view {
        display: none;
        flex-direction: column;
        align-items: center;
        padding: 32px 22px;
        text-align: center;
    }

    .completed-view.show { display: flex; }

    .complete-icon {
        width: 80px; height: 80px;
        background: rgba(0,230,118,0.1);
        border: 2px solid var(--green);
        border-radius: 50%;
        display: flex; align-items: center; justify-content: center;
        box-shadow: 0 0 32px var(--green-glow);
        animation: completePop 0.5s cubic-bezier(0.34,1.56,0.64,1) forwards;
        margin-bottom: 16px;
    }

    @keyframes completePop {
        0% { transform: scale(0.5); opacity: 0; }
        100% { transform: scale(1); opacity: 1; }
    }

    .complete-icon svg { width: 40px; height: 40px; stroke: var(--green); fill: none; }

    .complete-title {
        font-family: var(--display);
        font-size: 22px;
        font-weight: 800;
        color: #fff;
        margin-bottom: 6px;
    }

    .complete-sub {
        font-size: 13px;
        color: var(--muted);
        margin-bottom: 20px;
    }

    /* ── ACTION BUTTONS ── */
    .btn-wa {
        width: 100%;
        background: linear-gradient(135deg, #25D366, #128C7E);
        border: none;
        border-radius: 14px;
        color: white;
        font-family: var(--display);
        font-size: 15px;
        font-weight: 700;
        padding: 15px;
        cursor: pointer;
        display: flex; align-items: center; justify-content: center; gap: 8px;
        box-shadow: 0 6px 20px rgba(37,211,102,0.3);
        transition: transform 0.15s, box-shadow 0.15s;
        margin-bottom: 10px;
    }

    .btn-wa:hover { transform: translateY(-2px); }

    .btn-secondary {
        width: 100%;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 14px;
        color: var(--muted);
        font-family: var(--sans);
        font-size: 14px;
        font-weight: 500;
        padding: 12px;
        cursor: pointer;
        display: flex; align-items: center; justify-content: center; gap: 8px;
        transition: background 0.15s, color 0.15s, border-color 0.15s;
    }

    .btn-secondary:hover {
        background: rgba(255,68,68,0.1);
        color: var(--red);
        border-color: rgba(255,68,68,0.4);
    }

    .btn-secondary svg { width: 16px; height: 16px; }

    /* ── TIMELINE PANEL ── */
    .timeline-panel {
        display: flex;
        flex-direction: column;
        height: 100%;
        max-height: 820px;
    }

    .timeline-scroll {
        flex: 1;
        overflow-y: auto;
        padding: 24px;
        scrollbar-width: thin;
        scrollbar-color: var(--border) transparent;
    }

    .timeline-scroll::-webkit-scrollbar { width: 4px; }
    .timeline-scroll::-webkit-scrollbar-track { background: transparent; }
    .timeline-scroll::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    /* Timeline items */
    .tl-list { position: relative; display: flex; flex-direction: column; gap: 8px; }

    .tl-list::before {
        content: '';
        position: absolute;
        left: 19px; top: 24px; bottom: 24px;
        width: 1px;
        background: linear-gradient(to bottom, var(--blue), var(--border) 60%, transparent);
    }

    .tl-item {
        display: flex;
        align-items: center;
        gap: 16px;
        padding: 14px 16px 14px 0;
        border-radius: 14px;
        transition: all 0.3s;
        position: relative;
        z-index: 1;
    }

    .tl-item.entering {
        animation: slideInLeft 0.4s cubic-bezier(0.34,1.3,0.64,1) forwards;
    }

    @keyframes slideInLeft {
        from { opacity: 0; transform: translateX(-20px); }
        to   { opacity: 1; transform: translateX(0); }
    }

    .tl-item.flash-green .tl-node {
        animation: nodeFlash 0.6s ease forwards;
    }

    @keyframes nodeFlash {
        0%   { box-shadow: 0 0 0 0 var(--green-glow); background: var(--green); }
        50%  { box-shadow: 0 0 0 14px transparent; }
        100% { box-shadow: 0 0 4px var(--green-glow); }
    }

    /* Node */
    .tl-node {
        width: 38px; height: 38px;
        border-radius: 50%;
        flex-shrink: 0;
        display: flex; align-items: center; justify-content: center;
        font-family: var(--mono);
        font-size: 13px;
        font-weight: 700;
        border: 2px solid transparent;
        transition: all 0.4s;
        z-index: 2;
    }

    .tl-node.done {
        background: rgba(0,230,118,0.12);
        border-color: var(--green);
        color: var(--green);
        box-shadow: 0 0 12px rgba(0,230,118,0.2);
    }

    .tl-node.current {
        background: rgba(45,126,255,0.2);
        border-color: var(--blue);
        color: var(--blue);
        box-shadow: 0 0 16px var(--blue-glow);
        animation: currentGlow 1.8s ease-in-out infinite;
    }

    @keyframes currentGlow {
        0%, 100% { box-shadow: 0 0 12px var(--blue-glow); }
        50%       { box-shadow: 0 0 24px rgba(45,126,255,0.6); }
    }

    .tl-node.pending {
        background: var(--surface);
        border-color: var(--border);
        color: var(--muted);
    }

    /* Node check icon */
    .tl-node .check-svg { width: 16px; height: 16px; stroke: var(--green); fill: none; stroke-width: 2.5; }

    /* Card body */
    .tl-body {
        flex: 1;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 10px 14px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        transition: border-color 0.3s, background 0.3s;
    }

    .tl-item.done-item .tl-body {
        border-color: rgba(0,230,118,0.2);
    }

    .tl-item.current-item .tl-body {
        background: rgba(45,126,255,0.06);
        border-color: rgba(45,126,255,0.3);
    }

    .tl-item.pending-item .tl-body {
        opacity: 0.45;
    }

    .tl-name {
        font-family: var(--display);
        font-size: 15px;
        font-weight: 700;
        color: var(--text);
    }

    .tl-name.strikethrough { text-decoration: line-through; color: var(--muted); }

    .tl-badge {
        font-size: 10px;
        padding: 3px 8px;
        border-radius: 20px;
        font-family: var(--mono);
        white-space: nowrap;
        flex-shrink: 0;
    }

    .badge-action {
        background: rgba(45,126,255,0.15);
        border: 1px solid rgba(45,126,255,0.4);
        color: var(--blue);
    }

    .badge-time {
        background: rgba(0,230,118,0.1);
        border: 1px solid rgba(0,230,118,0.3);
        color: var(--green);
        font-size: 11px;
        font-weight: 600;
    }

    .badge-pending {
        background: rgba(90,106,136,0.15);
        border: 1px solid var(--border);
        color: var(--muted);
    }

    /* ── MODAL ── */
    .modal-overlay {
        display: none;
        position: fixed; inset: 0; z-index: 200;
        background: rgba(0,0,0,0.65);
        backdrop-filter: blur(8px);
        align-items: center; justify-content: center;
    }

    .modal-overlay.show { display: flex; }

    .modal-box {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 20px;
        padding: 28px;
        max-width: 360px;
        width: calc(100% - 40px);
        animation: fadeZoom 0.2s ease-out forwards;
    }

    @keyframes fadeZoom {
        from { opacity: 0; transform: scale(0.94); }
        to   { opacity: 1; transform: scale(1); }
    }

    .modal-icon {
        width: 48px; height: 48px;
        border-radius: 12px;
        background: rgba(255,68,68,0.12);
        display: flex; align-items: center; justify-content: center;
        margin-bottom: 16px;
    }

    .modal-icon svg { width: 24px; height: 24px; stroke: var(--red); fill: none; }

    .modal-title {
        font-family: var(--display);
        font-size: 20px;
        font-weight: 800;
        margin-bottom: 10px;
    }

    .modal-body {
        font-size: 14px;
        color: var(--muted);
        line-height: 1.6;
        margin-bottom: 24px;
    }

    .modal-actions {
        display: flex; gap: 12px;
    }

    .modal-cancel {
        flex: 1;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 12px;
        color: var(--text);
        font-family: var(--sans);
        font-size: 14px;
        font-weight: 600;
        padding: 13px;
        cursor: pointer;
        transition: background 0.15s;
    }

    .modal-cancel:hover { background: rgba(255,255,255,0.05); }

    .modal-confirm {
        flex: 1;
        background: var(--red);
        border: none;
        border-radius: 12px;
        color: white;
        font-family: var(--sans);
        font-size: 14px;
        font-weight: 700;
        padding: 13px;
        cursor: pointer;
        box-shadow: 0 4px 16px rgba(255,68,68,0.3);
        transition: opacity 0.15s, transform 0.1s;
    }

    .modal-confirm:hover { opacity: 0.9; }
    .modal-confirm:active { transform: scale(0.97); }

    /* ── CONFETTI CANVAS ── */
    #confetti-canvas {
        position: fixed;
        inset: 0;
        pointer-events: none;
        z-index: 300;
    }

    /* ── PROGRESS BAR TOP ── */
    .progress-bar-track {
        position: fixed;
        top: 64px;
        left: 0; right: 0;
        height: 3px;
        background: rgba(255,255,255,0.05);
        z-index: 99;
    }

    .progress-bar-fill {
        height: 100%;
        background: linear-gradient(90deg, var(--blue), #7eb8ff);
        transition: width 0.8s cubic-bezier(0.4,0,0.2,1);
        width: 0%;
        box-shadow: 0 0 8px var(--blue-glow);
    }

    /* ── SVG DEFS for gradient ── */
    svg.defs-only {
        position: absolute; width: 0; height: 0; overflow: hidden;
    }
</style>

</head>
<body>

<!-- SVG Gradient Defs -->

<svg class="defs-only">
    <defs>
        <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#2d7eff"/>
            <stop offset="100%" stop-color="#7eb8ff"/>
        </linearGradient>
    </defs>
</svg>

<!-- Confetti Canvas -->

<canvas id="confetti-canvas"></canvas>

<!-- Progress bar (top edge) -->

</main>

<script>
/* ─────────── STATE ─────────── */
const ROUTE_POINTS = [
    "BME","TG/OC DR","CY","E1/HTTC","FC","N1","S2","S1/S8",
    "TG / OC DR","CY","BME","S1/S8","S2","N1","FC","HTCC / E1",
    "OC DR","TG","BME"
];
const TOTAL = ROUTE_POINTS.length;
let currentIndex = 0;
let logs = [];
let isFinished = false;

/* ─────────── CLOCK ─────────── */
function updateClock() {
    const now = new Date();
    document.getElementById('clock-display').textContent =
        now.toLocaleTimeString('en-GB', { hour:'2-digit', minute:'2-digit', second:'2-digit', hour12:false });
    document.getElementById('date-display').textContent =
        now.toLocaleDateString([], { weekday:'long', year:'numeric', month:'long', day:'numeric' });
}
setInterval(updateClock, 1000);
updateClock();

/* ─────────── CLOCK IN ─────────── */
function clockIn(event) {
    if (isFinished) return;

    // Ripple effect
    const btn = document.getElementById('btn-clockin');
    const ripple = document.createElement('span');
    ripple.className = 'ripple';
    const rect = btn.getBoundingClientRect();
    const x = (event ? event.clientX - rect.left : rect.width/2) - 30;
    const y = (event ? event.clientY - rect.top  : rect.height/2) - 30;
    ripple.style.cssText = `width:60px;height:60px;left:${x}px;top:${y}px;`;
    btn.appendChild(ripple);
    setTimeout(() => ripple.remove(), 700);

    // Log entry
    logs.push({ point: currentIndex+1, location: ROUTE_POINTS[currentIndex], timestamp: new Date() });

    if (currentIndex + 1 >= TOTAL) {
        isFinished = true;
    } else {
        currentIndex++;
    }

    updateUI(true); // true = new entry animation
}

/* ─────────── UPDATE UI ─────────── */
function updateUI(newEntry) {
    updateProgressRing();
    updateStats(newEntry);
    updateTarget();
    renderTimeline(newEntry);
    updateTopBar();

    if (isFinished) {
        document.getElementById('active-view').style.display = 'none';
        document.getElementById('reset-btn-area').style.display = 'none';
        document.getElementById('completed-view').classList.add('show');
        document.getElementById('route-status-badge').textContent = 'COMPLETE';
        document.getElementById('route-status-badge').style.cssText =
            'font-family:var(--mono);font-size:11px;color:var(--green);background:rgba(0,230,118,0.1);border:1px solid rgba(0,230,118,0.25);padding:4px 10px;border-radius:20px;';
        launchConfetti();
    }
}

/* ─────────── PROGRESS RING ─────────── */
function updateProgressRing() {
    const pct = logs.length / TOTAL;
    const circumference = 2 * Math.PI * 52; // 326.7
    const offset = circumference * (1 - pct);
    document.getElementById('ring-fill').style.strokeDashoffset = offset;
    document.getElementById('ring-fill').style.strokeDasharray = circumference;
    document.getElementById('ring-pct').textContent = Math.round(pct * 100) + '%';
}

/* ─────────── TOP BAR ─────────── */
function updateTopBar() {
    document.getElementById('top-progress').style.width = (logs.length / TOTAL * 100) + '%';
}

/* ─────────── STATS ─────────── */
function updateStats(animate) {
    const cleared = logs.length;
    const remaining = TOTAL - cleared;

    const cEl = document.getElementById('stat-cleared-num');
    const rEl = document.getElementById('stat-remain-num');

    if (animate) {
        cEl.classList.remove('bump');
        rEl.classList.remove('bump');
        void cEl.offsetWidth; void rEl.offsetWidth;
        cEl.classList.add('bump');
        rEl.classList.add('bump');
        document.getElementById('stat-cleared').classList.add('updated');
        document.getElementById('stat-remain').classList.add('updated');
        setTimeout(() => {
            document.getElementById('stat-cleared').classList.remove('updated');
            document.getElementById('stat-remain').classList.remove('updated');
        }, 700);
    }

    cEl.textContent = cleared;
    rEl.textContent = remaining;
    document.getElementById('tl-progress-label').textContent = cleared + ' / ' + TOTAL;
}

/* ─────────── TARGET PANEL ─────────── */
function updateTarget() {
    if (isFinished) return;
    document.getElementById('target-label-text').textContent =
        'CURRENT TARGET · PT ' + (currentIndex + 1);
    document.getElementById('target-name').textContent = ROUTE_POINTS[currentIndex];

    // Breadcrumbs
    const crumb = document.getElementById('direction-crumbs');
    let html = '';
    if (currentIndex > 0) {
        html += `<span class="crumb-done">${ROUTE_POINTS[currentIndex-1]}</span>`;
        html += `<span class="crumb-arrow">›</span>`;
    }
    html += `<span class="crumb-current">${ROUTE_POINTS[currentIndex]}</span>`;
    if (currentIndex < TOTAL - 1) {
        html += `<span class="crumb-arrow">›</span>`;
        html += `<span class="crumb-next">${ROUTE_POINTS[currentIndex+1]}</span>`;
    }
    crumb.innerHTML = html;
}

/* ─────────── TIMELINE ─────────── */
function renderTimeline(newEntry) {
    const list = document.getElementById('tl-list');
    let html = '';

    ROUTE_POINTS.forEach((loc, i) => {
        const isDone    = i < logs.length;
        const isCurrent = i === currentIndex && !isFinished;
        const log       = logs.find(l => l.point === i+1);

        let nodeClass = 'pending';
        let nodeInner = `<span>${i+1}</span>`;
        if (isDone)    { nodeClass='done'; nodeInner=`<svg class="check-svg" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>`; }
        if (isCurrent) nodeClass='current';

        let itemClass = 'tl-item';
        if (isDone)    itemClass += ' done-item';
        if (isCurrent) itemClass += ' current-item';
        if (!isDone && !isCurrent) itemClass += ' pending-item';

        // Flash animation on the most recently completed entry
        if (newEntry && i === currentIndex - 1) itemClass += ' flash-green';

        let badgeHtml = '';
        if (isDone && log) {
            const t = log.timestamp.toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit',second:'2-digit',hour12:false});
            badgeHtml = `<span class="tl-badge badge-time">${t}</span>`;
        } else if (isCurrent) {
            badgeHtml = `<span class="tl-badge badge-action">▶ NOW</span>`;
        } else {
            badgeHtml = `<span class="tl-badge badge-pending">PT ${i+1}</span>`;
        }

        const nameClass = isDone ? 'tl-name strikethrough' : 'tl-name';

        html += `
        <div class="${itemClass}" id="tl-${i}">
            <div class="tl-node ${nodeClass}">${nodeInner}</div>
            <div class="tl-body">
                <span class="${nameClass}">${loc}</span>
                ${badgeHtml}
            </div>
        </div>`;
    });

    list.innerHTML = html;
}

/* ─────────── WHATSAPP ─────────── */
function shareToWhatsApp() {
    if (!logs.length) return;
    const d = logs[0].timestamp;
    const dd = String(d.getDate()).padStart(2,'0');
    const mm = String(d.getMonth()+1).padStart(2,'0');
    const yyyy = d.getFullYear();
    let text = `*Date:* ${dd}/${mm}/${yyyy}\n\n`;
    logs.forEach(l => {
        const t = l.timestamp.toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit',second:'2-digit',hour12:false});
        text += `${l.location} - ${t}\n`;
    });
    window.open('https://wa.me/?text=' + encodeURIComponent(text), '_blank');
}

/* ─────────── MODAL ─────────── */
function showResetModal() {
    document.getElementById('reset-modal').classList.add('show');
}
function cancelReset() {
    document.getElementById('reset-modal').classList.remove('show');
}
function confirmReset() {
    currentIndex = 0; logs = []; isFinished = false;
    document.getElementById('active-view').style.display = '';
    document.getElementById('reset-btn-area').style.display = '';
    document.getElementById('completed-view').classList.remove('show');
    document.getElementById('route-status-badge').textContent = 'IN PROGRESS';
    document.getElementById('route-status-badge').style.cssText =
        'font-family:var(--mono);font-size:11px;color:var(--blue);background:rgba(45,126,255,0.1);border:1px solid rgba(45,126,255,0.25);padding:4px 10px;border-radius:20px;';
    cancelReset();
    updateUI(false);
}

/* ─────────── CONFETTI ─────────── */
function launchConfetti() {
    const canvas = document.getElementById('confetti-canvas');
    const ctx    = canvas.getContext('2d');
    canvas.width  = window.innerWidth;
    canvas.height = window.innerHeight;

    const colors = ['#2d7eff','#00e676','#ffb300','#ff4081','#7eb8ff','#ffffff'];
    const particles = Array.from({length:140}, () => ({
        x: Math.random() * canvas.width,
        y: -10 - Math.random() * 200,
        r: 3 + Math.random() * 5,
        d: 2 + Math.random() * 3,
        color: colors[Math.floor(Math.random()*colors.length)],
        tilt: Math.random() * 10 - 10,
        tiltAngle: 0,
        tiltSpeed: 0.05 + Math.random() * 0.05,
        alpha: 1,
    }));

    let frame = 0;
    function draw() {
        ctx.clearRect(0,0,canvas.width,canvas.height);
        particles.forEach(p => {
            ctx.save();
            ctx.globalAlpha = p.alpha;
            ctx.fillStyle = p.color;
            ctx.beginPath();
            ctx.ellipse(p.x, p.y, p.r, p.r*0.4, p.tiltAngle, 0, Math.PI*2);
            ctx.fill();
            ctx.restore();
            p.y += p.d;
            p.tiltAngle += p.tiltSpeed;
            p.x += Math.sin(p.tiltAngle) * 1.5;
            if (p.y > canvas.height * 0.7) p.alpha -= 0.012;
        });
        frame++;
        if (frame < 220) requestAnimationFrame(draw);
        else ctx.clearRect(0,0,canvas.width,canvas.height);
    }
    draw();
}

/* ─────────── INIT ─────────── */
updateUI(false);
</script>
